server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — força re-resolução do hostname 'api' a cada 10s.
    # Sem isso, nginx cacheia o IP do container no startup e quebra após rebuilds.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream http://api:8000;

    # SSE and proxy common settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /auth/ {
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /agents/ {
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /health/ {
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /documents/ {
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /session/ {
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /stt {
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120;
    }

    location /tts {
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120;
    }

    location /chat {
        # If the client accepts HTML (browser navigation), serve the SPA
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass $upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    # SPA fallback: all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
