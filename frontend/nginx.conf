server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSE and proxy common settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /auth/ {
        proxy_pass http://api:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /agents/ {
        proxy_pass http://api:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /health/ {
        proxy_pass http://api:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /documents/ {
        proxy_pass http://api:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /session/ {
        proxy_pass http://api:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /chat {
        # If the client accepts HTML (browser navigation), serve the SPA
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://api:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    # SPA fallback: all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
