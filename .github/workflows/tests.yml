name: Unit Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run unit tests
        run: |
          uv run pytest \
            tests/test_fase11/ \
            tests/test_fase8/ \
            tests/test_configurable_agent.py \
            tests/test_skills.py \
            tests/test_agent_registry.py \
            -v --tb=short
