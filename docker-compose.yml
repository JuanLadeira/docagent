services:
  api:
    build:
      context: .
      dockerfile: compose/dev/api/Dockerfile
    command: uv run uvicorn docagent.api:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown 3
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_PATH: /app/data/chroma_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./data/docagent.db:/app/docagent.db
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: compose/dev/api/Dockerfile
    command: >
      uv run streamlit run src/docagent/ui.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./src:/app/src
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: compose/dev/frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

  evolution-api:
    build:
      context: .
      dockerfile: compose/dev/evolution-api/Dockerfile
      args:
        VERSION: "2.3.7"
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      # Banco de dados (v2 usa PostgreSQL para persistência)
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://user:pass@postgres:5432/evolution"
      DATABASE_CONNECTION_CLIENT_NAME: evolution_client
      # Storage no banco
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      # Cache: desabilitar Redis (não usado), usar memória local
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  evolution_data:
  evolution_db_data:
